[build]
command = "pnpm run build:client"
publish = "dist/spa"

# SPA routing - Always serve index.html for non-file requests
# This allows React Router to handle all client-side routes on refresh
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
conditions = { Not = [{ Param = "Path", Value = "/api/*" }] }
